<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>GBA Sokoban Asset Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --bg-input: #2a2a2a;
            --accent: #00cec9;
            --accent-hover: #81ecec;
            --text-main: #dfdfdf;
            --text-muted: #888;
            --border: #333;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        button { background: var(--accent); color: #111; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: 600; transition: background 0.2s; }
        button:hover { background: var(--accent-hover); }
        button.danger { background: #d63031; color: white; }
        button.danger:hover { background: #ff7675; }
        input { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 6px; border-radius: 4px; width: 100%; box-sizing: border-box; }
        
        .panel { background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .header { padding: 15px; border-bottom: 1px solid var(--border); font-weight: 600; background: linear-gradient(180deg, #2a2a2a 0%, #1e1e1e 100%); display: flex; justify-content: space-between; align-items: center; }
        
        .sidebar { width: 250px; min-width: 200px; resize: horizontal; overflow-y: auto; }
        .set-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .set-item:hover { background: rgba(255,255,255,0.05); }
        .set-item.selected { background: rgba(0, 206, 201, 0.2); border-left: 3px solid var(--accent); }
        .set-item-title { font-weight: 500; font-size: 14px; }
        
        .main-view { flex-grow: 1; display: flex; flex-direction: column; background: #111; position: relative; }
        .toolbar { padding: 10px; background: rgba(30,30,30,0.8); border-bottom: 1px solid var(--border); display: flex; gap: 10px; }
        .content { padding: 20px; overflow-y: auto; flex-grow:1; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 12px; color: var(--text-muted); }
        
        .items-list { background: var(--bg-input); border: 1px solid var(--border); border-radius: 4px; padding: 10px; }
        .sprite-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; background: var(--bg-panel); padding: 5px; border-radius: 4px;}
        .sprite-row input { flex-grow: 1; }
        
        .empty-state { text-align: center; color: var(--text-muted); margin-top: 50px; }
    </style>
</head>
<body>
    <div class="panel sidebar">
        <div class="header">
            Image Sets
            <button onclick="addSet()" title="Add Set" style="padding:2px 8px;">+</button>
        </div>
        <div id="sets-list"></div>
    </div>

    <div class="main-view">
        <div class="toolbar">
            <button onclick="exportJSON()">Save / Export JSON</button>
            <input type="file" id="importFile" accept=".json" style="width: auto; background:transparent; border:none;" onchange="importJSON(event)">
            <span style="font-size:12px; color:var(--text-muted); align-self:center; margin-left:auto;">(Export specifically as "tools/assets_list.json" and run .exe)</span>
        </div>
        
        <div class="content" id="main-content">
            <div class="empty-state">Select or create an Image Set to edit.</div>
        </div>
    </div>

<script>
    // Default Data
    let assets = {
        "menu_items": {
            "path": "graphics/ui/menu",
            "size": [64, 64],
            "items": ["spr_menu_paper", "spr_menu_icon_story"]
        }
    };
    
    let activeKey = null;

    function renderSidebar() {
        const list = document.getElementById('sets-list');
        list.innerHTML = '';
        Object.keys(assets).forEach(key => {
            const el = document.createElement('div');
            el.className = 'set-item' + (activeKey === key ? ' selected' : '');
            el.innerHTML = `<span class="set-item-title">${key}</span> 
                            <button class="danger" style="padding:2px 6px; font-size:10px;" onclick="deleteSet('${key}', event)">X</button>`;
            el.onclick = () => selectSet(key);
            list.appendChild(el);
        });
    }

    function renderMain() {
        const content = document.getElementById('main-content');
        if (!activeKey || !assets[activeKey]) {
            content.innerHTML = '<div class="empty-state">Select or create an Image Set to edit.</div>';
            return;
        }
        
        const set = assets[activeKey];
        
        let itemsHtml = '';
        set.items.forEach((item, index) => {
            itemsHtml += `
                <div class="sprite-row">
                    <span style="font-size:12px; color:var(--text-muted); width:20px;">[${index}]</span>
                    <input type="text" value="${item}" onchange="updateItem(${index}, this.value)">
                    <button class="danger" onclick="deleteItem(${index})">Del</button>
                </div>
            `;
        });

        content.innerHTML = `
            <h2 style="margin-top:0;">Set: ${activeKey}</h2>
            <div class="form-group">
                <label>Set Key (Name)</label>
                <input type="text" value="${activeKey}" onchange="renameSet(this.value)">
            </div>
            <div class="form-group">
                <label>Target Subdirectory (e.g. graphics/stills/chara)</label>
                <input type="text" value="${set.path || ''}" onchange="updateSet('path', this.value)">
            </div>
            <div style="display:flex; gap:10px;">
                <div class="form-group" style="flex:1;">
                    <label>Generate Width (px)</label>
                    <input type="number" value="${set.size[0] || 32}" onchange="updateSize(0, this.value)">
                </div>
                <div class="form-group" style="flex:1;">
                    <label>Generate Height (px)</label>
                    <input type="number" value="${set.size[1] || 32}" onchange="updateSize(1, this.value)">
                </div>
            </div>
            
            <h3 style="margin-top:20px; border-bottom:1px solid #333; padding-bottom:5px;">Sprite Items <button onclick="addItem()" style="float:right;">+ Add Item</button></h3>
            <p style="font-size:12px; color:var(--text-muted);">These are the physical component names. The tool will auto-generate .bmp and .json files for these if they don't exist.</p>
            <div class="items-list">
                ${itemsHtml}
                ${set.items.length === 0 ? '<div style="font-size:12px; color:#888;">No items yet.</div>' : ''}
            </div>
        `;
    }

    function selectSet(key) {
        activeKey = key;
        renderSidebar();
        renderMain();
    }

    function addSet() {
        const name = prompt("Enter new Set Name (e.g. chara_stills):");
        if (!name || assets[name]) return;
        assets[name] = { path: "graphics", size: [32, 32], items: [] };
        selectSet(name);
    }

    function renameSet(newKey) {
        if (!newKey || newKey === activeKey || assets[newKey]) return;
        assets[newKey] = assets[activeKey];
        delete assets[activeKey];
        activeKey = newKey;
        renderSidebar();
        renderMain();
    }

    function deleteSet(key, e) {
        e.stopPropagation();
        if(confirm(`Delete set '${key}'?`)) {
            delete assets[key];
            if(activeKey === key) activeKey = null;
            renderSidebar();
            renderMain();
        }
    }

    function updateSet(key, val) {
        assets[activeKey][key] = val;
    }
    
    function updateSize(idx, val) {
        assets[activeKey].size[idx] = parseInt(val) || 32;
    }

    function addItem() {
        assets[activeKey].items.push("spr_new_" + Math.random().toString(36).substr(2, 4));
        renderMain();
    }

    function updateItem(index, val) {
        assets[activeKey].items[index] = val;
    }

    function deleteItem(index) {
        assets[activeKey].items.splice(index, 1);
        renderMain();
    }

    function exportJSON() {
        const jsonStr = JSON.stringify(assets, null, 2);
        const blob = new Blob([jsonStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'assets_list.json';
        a.click();
    }

    function importJSON(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e2) => {
            try {
                assets = JSON.parse(e2.target.result);
                activeKey = Object.keys(assets)[0] || null;
                renderSidebar();
                renderMain();
            } catch(ex) {
                alert("Invalid JSON");
            }
        };
        reader.readAsText(file);
    }

    // Try load from local file if fetched (might fail due to CORS)
    fetch('../assets_list.json')
        .then(res => res.json())
        .then(data => {
            assets = data;
            activeKey = Object.keys(assets)[0] || null;
            renderSidebar();
            renderMain();
        }).catch(err => {
            renderSidebar();
            renderMain();
        });
</script>
</body>
</html>
